# mkdocs.yml - Agent Installation Guide
site_name: Agent Installation Guide
site_description: Complete guide for installing and configuring EPMware On-Premise Agent
site_author: EPMware, Inc.
site_url: https://agent-guide.epmware.com

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
  - navigation.top
  - navigation.indexes
  - search.highlight
  - search.share
  - search.suggest
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - toc.follow
  - toc.integrate
  
  logo: assets/images/epmware-logo.png
  favicon: assets/images/favicon.ico

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search:
      lang: en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom

# Navigation structure
nav:
  - Documentation Center: https://docs.epmware.com
  
  - Agent Installation Home:
    - index.md
  
  
  - Hardware And Software Requirements: getting-started/hardware_software_requirement.md
  
  - On Premise Agent Architecture: getting-started/architecture.md
  
  - Prerequisites Software Installation: installation/cygwin.md

  
  - EPMWare On Premise Agent Configuration: configuration/onpremise_agent_config.md

  - How to Start and Stop Agent on Windows Servers: configuration/start_stop_agent.md
  
  - Application Specific Tasks :  
    - Hyperian HFM : app_specific_tasks/hfm.md
    - Hyperian Planning : app_specific_tasks/planning.md
    - PCMCS : app_specific_tasks/pcmcs.md
    
  - On-premise Server Option Requirements: on_premise_server_option/on_premise_server_option_requirement.md
 
  
  - Troubleshooting: troubleshooting/troubleshooting.md

 

